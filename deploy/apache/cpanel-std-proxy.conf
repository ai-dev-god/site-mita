# LMBSC Hospitality Platform — cPanel HTTP vhost include
# Installed to: /etc/apache2/conf.d/userdata/std/2_4/mita/app.lamitabiciclista.ro/proxy.conf
# HTTP vhost: only proxy API for health checks; redirect to HTTPS handled by cPanel

<IfModule mod_proxy.c>
    ProxyPreserveHost On
    ProxyRequests     Off

    # FastAPI backend
    ProxyPass        /api/ http://127.0.0.1:8001/api/
    ProxyPassReverse /api/ http://127.0.0.1:8001/api/

    # Health endpoint
    ProxyPass        /health http://127.0.0.1:8001/health
    ProxyPassReverse /health http://127.0.0.1:8001/health
</IfModule>
