# LMBSC Hospitality Platform — cPanel SSL vhost include
# Installed to: /etc/apache2/conf.d/userdata/ssl/2_4/mita/app.lamitabiciclista.ro/proxy.conf
# Deploy with: bash deploy/deploy.sh

<IfModule mod_rewrite.c>
    RewriteEngine On
    # Redirect bare root to the app entry point
    RewriteRule ^/?$ /hospitality [R=301,L]
</IfModule>

<IfModule mod_proxy.c>
    ProxyPreserveHost On
    ProxyRequests     Off

    <IfModule mod_headers.c>
        RequestHeader set X-Forwarded-Proto "https"
    </IfModule>

    # FastAPI backend (direct — bypasses Next.js rewrite layer)
    ProxyPass        /api/         http://127.0.0.1:8001/api/
    ProxyPassReverse /api/         http://127.0.0.1:8001/api/

    ProxyPass        /health       http://127.0.0.1:8001/health
    ProxyPassReverse /health       http://127.0.0.1:8001/health

    ProxyPass        /docs         http://127.0.0.1:8001/docs
    ProxyPassReverse /docs         http://127.0.0.1:8001/docs

    ProxyPass        /redoc        http://127.0.0.1:8001/redoc
    ProxyPassReverse /redoc        http://127.0.0.1:8001/redoc

    ProxyPass        /openapi.json http://127.0.0.1:8001/openapi.json
    ProxyPassReverse /openapi.json http://127.0.0.1:8001/openapi.json

    # Next.js frontend — basePath is /hospitality, proxy everything else
    ProxyPass        /             http://127.0.0.1:3001/
    ProxyPassReverse /             http://127.0.0.1:3001/
</IfModule>
