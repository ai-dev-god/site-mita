# LMBSC — cPanel SSL vhost include for app.lamitabiciclista.ro
#
# Architecture:
#   app.lamitabiciclista.ro/            → static marketing site (Apache DocumentRoot)
#   app.lamitabiciclista.ro/hospitality → Next.js hospitality platform (port 3001)
#   app.lamitabiciclista.ro/api/        → FastAPI backend (port 8001)
#   app.lamitabiciclista.ro/ws/         → FastAPI WebSocket (port 8001)

<IfModule mod_proxy.c>
    ProxyPreserveHost On
    ProxyRequests     Off

    <IfModule mod_headers.c>
        RequestHeader set X-Forwarded-Proto "https"
    </IfModule>

    # FastAPI backend — must be listed before the Next.js proxy
    ProxyPass        /api/         http://127.0.0.1:8001/api/
    ProxyPassReverse /api/         http://127.0.0.1:8001/api/

    # WebSocket — live floor view updates (requires mod_proxy_wstunnel)
    <IfModule mod_proxy_wstunnel.c>
        ProxyPass        /ws/          ws://127.0.0.1:8001/ws/
        ProxyPassReverse /ws/          ws://127.0.0.1:8001/ws/
    </IfModule>

    ProxyPass        /health       http://127.0.0.1:8001/health
    ProxyPassReverse /health       http://127.0.0.1:8001/health

    ProxyPass        /docs         http://127.0.0.1:8001/docs
    ProxyPassReverse /docs         http://127.0.0.1:8001/docs

    ProxyPass        /redoc        http://127.0.0.1:8001/redoc
    ProxyPassReverse /redoc        http://127.0.0.1:8001/redoc

    ProxyPass        /openapi.json http://127.0.0.1:8001/openapi.json
    ProxyPassReverse /openapi.json http://127.0.0.1:8001/openapi.json

    # Next.js hospitality app at /hospitality (basePath=/hospitality)
    ProxyPass        /hospitality  http://127.0.0.1:3001/hospitality
    ProxyPassReverse /hospitality  http://127.0.0.1:3001/hospitality

    # Static marketing site is served by Apache from DocumentRoot — no proxy needed for /
</IfModule>
