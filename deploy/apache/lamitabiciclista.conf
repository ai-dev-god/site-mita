# ============================================================
# lamitabiciclista.ro — Apache VirtualHost configuration
# Apply with: sudo a2ensite lamitabiciclista && sudo systemctl reload apache2
# Requires: mod_proxy mod_proxy_http mod_headers mod_rewrite ssl
# ============================================================

# -----------------------------------------------------------
# HTTP → HTTPS redirect (apex + www)
# -----------------------------------------------------------
<VirtualHost *:80>
    ServerName lamitabiciclista.ro
    ServerAlias www.lamitabiciclista.ro app.lamitabiciclista.ro

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# -----------------------------------------------------------
# HTTPS — apex (static marketing site)
# -----------------------------------------------------------
<VirtualHost *:443>
    ServerName lamitabiciclista.ro
    ServerAlias www.lamitabiciclista.ro

    DocumentRoot /home/mita/public_html

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/lamitabiciclista.ro/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/lamitabiciclista.ro/privkey.pem
    Include               /etc/letsencrypt/options-ssl-apache.conf

    <Directory /home/mita/public_html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Security headers
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog  ${APACHE_LOG_DIR}/lmbsc-apex-error.log
    CustomLog ${APACHE_LOG_DIR}/lmbsc-apex-access.log combined
</VirtualHost>

# -----------------------------------------------------------
# HTTPS — app subdomain (FastAPI backend + platform frontend)
# -----------------------------------------------------------
<VirtualHost *:443>
    ServerName app.lamitabiciclista.ro

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/lamitabiciclista.ro/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/lamitabiciclista.ro/privkey.pem
    Include               /etc/letsencrypt/options-ssl-apache.conf

    # ---------- FastAPI backend ----------
    ProxyPreserveHost On
    ProxyRequests     Off

    <Location /api/>
        ProxyPass        http://127.0.0.1:8001/api/
        ProxyPassReverse http://127.0.0.1:8001/api/
        RequestHeader set X-Forwarded-Proto "https"
        RequestHeader set X-Forwarded-For  "%{REMOTE_ADDR}s"
    </Location>

    # Health endpoint (useful for uptime monitors)
    <Location /health>
        ProxyPass        http://127.0.0.1:8001/health
        ProxyPassReverse http://127.0.0.1:8001/health
    </Location>

    # ---------- Next.js platform frontend (Option A: static export) ----------
    # Uncomment when apps/web static export is deployed to /home/mita/public_html/platform/
    # DocumentRoot /home/mita/public_html/platform
    # <Directory /home/mita/public_html/platform>
    #     Options -Indexes +FollowSymLinks
    #     AllowOverride All
    #     Require all granted
    #     FallbackResource /index.html
    # </Directory>

    # ---------- Next.js platform frontend (Option B: Node.js process on :3001) ----------
    # Uncomment instead of Option A if SSR is required
    # ProxyPass        / http://127.0.0.1:3001/
    # ProxyPassReverse / http://127.0.0.1:3001/

    # Security headers
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog  ${APACHE_LOG_DIR}/lmbsc-app-error.log
    CustomLog ${APACHE_LOG_DIR}/lmbsc-app-access.log combined
</VirtualHost>
