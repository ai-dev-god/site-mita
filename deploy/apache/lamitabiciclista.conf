# ============================================================
# lamitabiciclista.ro — Apache VirtualHost configuration
# Apply with: sudo a2ensite lamitabiciclista && sudo systemctl reload apache2
# Requires: mod_proxy mod_proxy_http mod_headers mod_rewrite ssl
# ============================================================

# -----------------------------------------------------------
# HTTP → HTTPS redirect (apex + www)
# -----------------------------------------------------------
<VirtualHost *:80>
    ServerName lamitabiciclista.ro
    ServerAlias www.lamitabiciclista.ro app.lamitabiciclista.ro

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# -----------------------------------------------------------
# HTTPS — apex (static marketing site + /hospitality platform)
# -----------------------------------------------------------
<VirtualHost *:443>
    ServerName lamitabiciclista.ro
    ServerAlias www.lamitabiciclista.ro

    DocumentRoot /home/aurel/public_html

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/lamitabiciclista.ro/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/lamitabiciclista.ro/privkey.pem
    Include               /etc/letsencrypt/options-ssl-apache.conf

    <Directory /home/aurel/public_html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ---------- Deploy webhook receiver (Python on :9000) ----------
    <Location /deploy>
        ProxyPass        http://127.0.0.1:9000/deploy
        ProxyPassReverse http://127.0.0.1:9000/deploy
    </Location>

    # ---------- Hospitality platform (Next.js on :3001) ----------
    ProxyPreserveHost On
    ProxyRequests     Off

    <Location /hospitality>
        ProxyPass        http://127.0.0.1:3001/hospitality
        ProxyPassReverse http://127.0.0.1:3001/hospitality
        RequestHeader set X-Forwarded-Proto "https"
        RequestHeader set X-Forwarded-For  "%{REMOTE_ADDR}s"
    </Location>

    # Security headers
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog  ${APACHE_LOG_DIR}/lmbsc-apex-error.log
    CustomLog ${APACHE_LOG_DIR}/lmbsc-apex-access.log combined
</VirtualHost>

# -----------------------------------------------------------
# HTTPS — app subdomain (redirect to main domain /hospitality)
# -----------------------------------------------------------
<VirtualHost *:443>
    ServerName app.lamitabiciclista.ro

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/lamitabiciclista.ro/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/lamitabiciclista.ro/privkey.pem
    Include               /etc/letsencrypt/options-ssl-apache.conf

    # Redirect legacy app subdomain to the canonical /hospitality path
    RedirectMatch permanent ^/$ https://lamitabiciclista.ro/hospitality
    RedirectMatch permanent ^(.*)$ https://lamitabiciclista.ro/hospitality$1

    ErrorLog  ${APACHE_LOG_DIR}/lmbsc-app-error.log
    CustomLog ${APACHE_LOG_DIR}/lmbsc-app-access.log combined
</VirtualHost>
