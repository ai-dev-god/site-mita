# LMBSC — cPanel HTTP vhost include for bilete.lamitabiciclista.ro
# Redirect all HTTP to HTTPS
#
# Live location on the server (cPanel/EasyApache 4):
#   /etc/apache2/conf.d/userdata/std/2_4/mita/bilete.lamitabiciclista.ro/proxy.conf
#
# This file is the source-controlled copy. To re-install on a fresh box:
#   sudo mkdir -p /etc/apache2/conf.d/userdata/std/2_4/mita/bilete.lamitabiciclista.ro
#   sudo cp deploy/apache/cpanel-userdata/std/mita/bilete.lamitabiciclista.ro/proxy.conf \
#           /etc/apache2/conf.d/userdata/std/2_4/mita/bilete.lamitabiciclista.ro/proxy.conf
#   sudo /scripts/rebuildhttpdconf
#   sudo systemctl reload httpd

<IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteRule ^(.*)$ https://bilete.lamitabiciclista.ro$1 [R=301,L]
</IfModule>
