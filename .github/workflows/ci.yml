name: CI

on:
  pull_request:
    branches: [main]

jobs:
  api-lint:
    name: API — lint & type check
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy .

  api-test:
    name: API — tests
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: lmbsc
          POSTGRES_PASSWORD: lmbsc_test
          POSTGRES_DB: lmbsc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://lmbsc:lmbsc_test@localhost/lmbsc_test
          REDIS_URL: redis://localhost:6379/0
          # Stub required secrets so the app can import
          CLERK_SECRET_KEY: sk_test_stub
          CLERK_PUBLISHABLE_KEY: pk_test_stub
          TWILIO_ACCOUNT_SID: ACstub
          TWILIO_AUTH_TOKEN: stub
          RESEND_API_KEY: re_stub
          STRIPE_SECRET_KEY: sk_test_stub
          SECRET_KEY: ci-test-secret-key-not-for-production
        run: pytest --cov=app --cov-report=term-missing -q

  web-lint:
    name: Web — lint & type check
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit
