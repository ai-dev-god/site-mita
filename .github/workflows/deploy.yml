name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deploy runs on the production machine itself — no remote SSH needed.
# GitHub Actions is used only to notify that a push landed on main.
# The production machine runs local-deploy.sh after each push.

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  notify:
    name: Push landed on main
    runs-on: ubuntu-24.04
    steps:
      - name: Notify Slack — push to main
        if: vars.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":rocket: *Push to main* — <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`> by ${{ github.actor }} — run local-deploy.sh on server"
            }
